name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Test Node.js API
  test-api:
    name: Test API Service
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: services/api/package-lock.json
      
      - name: Install dependencies
        working-directory: ./services/api
        run: npm ci
      
      - name: Run tests
        working-directory: ./services/api
        run: npm test

  # Test Python Processor
  test-processor:
    name: Test Processor Service
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        working-directory: ./services/processor
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests
        working-directory: ./services/processor
        run: pytest
